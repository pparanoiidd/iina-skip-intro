<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }

      body {
        display: flex;
        align-items: flex-end;
        justify-content: flex-end;
        box-sizing: border-box;
        padding: 24px;
      }

      #box {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 12px 12px 14px;
        border-radius: 14px;
        color: rgba(255, 255, 255, 0.96);
        background: rgba(18, 18, 20, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.3);
        user-select: none;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: translateZ(0);
      }

      #box.visible {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      #meta {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      #title {
        font-size: 13px;
        font-weight: 600;
        line-height: 1.2;
      }

      #subtitle {
        font-size: 11px;
        line-height: 1.2;
        color: rgba(255, 255, 255, 0.78);
      }

      .btn {
        appearance: none;
        border: 0;
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.96);
        background: rgba(255, 255, 255, 0.16);
        cursor: pointer;
      }

      .btn:hover {
        background: rgba(255, 255, 255, 0.24);
      }

      #dismiss-btn {
        padding: 8px 10px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div id="box" aria-live="polite">
      <div id="meta">
        <div id="title">Skip Intro</div>
        <div id="subtitle">Jump past the opening</div>
      </div>
      <button id="skip-btn" class="btn" data-clickable>Skip</button>
      <button id="dismiss-btn" class="btn" data-clickable aria-label="Dismiss">x</button>
    </div>

    <script>
      var box = document.getElementById('box');
      var subtitle = document.getElementById('subtitle');
      var skipBtn = document.getElementById('skip-btn');
      var dismissBtn = document.getElementById('dismiss-btn');

      function setVisible(visible) {
        box.classList.toggle('visible', !!visible);
      }

      function postMessage(name, payload) {
        if (typeof iina !== 'undefined') {
          iina.postMessage(name, payload);
        }
      }

      function pad2(value) {
        return value < 10 ? '0' + value : String(value);
      }

      function formatTime(totalSeconds) {
        var s = Math.max(0, Math.floor(Number(totalSeconds) || 0));
        var h = Math.floor(s / 3600);
        var m = Math.floor((s % 3600) / 60);
        var sec = s % 60;
        if (h > 0) {
          return h + ':' + pad2(m) + ':' + pad2(sec);
        }
        return m + ':' + pad2(sec);
      }

      window.addEventListener('error', function (event) {
        postMessage('error', event.message);
      });

      skipBtn.addEventListener('click', function () {
        postMessage('skip');
      });

      dismissBtn.addEventListener('click', function () {
        postMessage('dismiss');
      });

      if (typeof iina !== 'undefined') {
        iina.onMessage('state', function (state) {
          if (!state || !state.visible) {
            setVisible(false);
            return;
          }
          subtitle.textContent = 'Jump to ' + formatTime(state.introEnd);
          setVisible(true);
        });
      }
    </script>
  </body>
</html>
