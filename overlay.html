<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }

      body {
        display: flex;
        align-items: flex-end;
        justify-content: flex-end;
        box-sizing: border-box;
        padding: clamp(2px, 1.5vw, 46px);
      }

      /* ── wrapper ── */
      #box-wrap {
        position: relative;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity 100ms ease-out,
          visibility 0s linear 300ms;
      }

      #box-wrap.visible {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transition-delay: 0s;
      }

      /* ── main button ── */
      #box {
        --auto-dismiss-ms: 10000ms;

        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 26px 32px;
        border-radius: 12px;

        color: rgba(255, 255, 255, 0.88);
        background: rgba(34, 36, 40, 0.62);
        -webkit-backdrop-filter: blur(32px) saturate(165%) contrast(0.9);
        backdrop-filter: blur(32px) saturate(165%) contrast(0.9);
        cursor: pointer;
        user-select: none;

        transform: translateX(34px) scale(0.97);
        transition:
          filter 140ms ease,
          transform 360ms cubic-bezier(0.2, 0.9, 0.2, 1);

        box-shadow:
          0 18px 44px rgba(0, 0, 0, 0.24),
          inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      /* Auto-dismiss progress layer */
      #box::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: rgba(255, 255, 255, 0.1);
        opacity: 0;
        clip-path: inset(0 0 0 0);
        pointer-events: none;
      }

      #box[data-progress-style='bar']::before {
        inset: auto 0 0;
        height: 2px;
        background: rgba(255, 255, 255, 0.34);
      }

      /* Shine sweep layer */
      #box::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(
          105deg,
          transparent 0%,
          transparent 35%,
          rgba(255, 255, 255, 0.25) 45%,
          rgba(255, 255, 255, 0.5) 50%,
          rgba(255, 255, 255, 0.25) 55%,
          transparent 65%,
          transparent 100%
        );
        background-size: 300% 100%;
        background-position: 100% 0;
        opacity: 0;
        pointer-events: none;
      }

      /* ── visible state ── */
      #box-wrap.visible #box {
        transform: translateX(0) scale(1);
        animation: prompt-arrival 650ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      #box-wrap.visible #box::before {
        opacity: 1;
        animation: auto-dismiss-progress var(--auto-dismiss-ms) linear forwards;
      }

      #box-wrap.visible #box::after {
        animation: shine-sweep 600ms ease-in-out 100ms 1 forwards;
      }

      #box-wrap.auto-dismiss-paused #box::before {
        animation-play-state: paused;
      }

      #box-wrap.visible #box:hover {
        filter: brightness(1.22);
      }

      /* ── title ── */
      #title {
        position: relative;
        z-index: 1;
        color: rgba(255, 255, 255, 0.42);
        font-size: 22px;
        font-weight: 600;
        line-height: 1.2;
        letter-spacing: -0.01em;
        mix-blend-mode: color-dodge;
        pointer-events: none;
      }

      /* ── keyframes ── */

      /* Slide in from right */
      @keyframes prompt-arrival {
        0% {
          transform: translateX(34px) scale(0.97);
        }
        100% {
          transform: translateX(0) scale(1);
        }
      }

      /* Light streak sweeping across the button */
      @keyframes shine-sweep {
        0% {
          opacity: 1;
          background-position: 0% 0;
        }
        100% {
          opacity: 1;
          background-position: 100% 0;
        }
      }

      /* Auto-dismiss countdown */
      @keyframes auto-dismiss-progress {
        from {
          clip-path: inset(0 0 0 0);
        }
        to {
          clip-path: inset(0 100% 0 0);
        }
      }
    </style>
  </head>
  <body>
    <div id="box-wrap">
      <div
        id="box"
        aria-live="polite"
        data-clickable
        data-progress-style="full"
        role="button"
        tabindex="0"
        aria-label="Skip Intro"
      >
        <div id="title">Skip Intro</div>
      </div>
    </div>

    <script>
      var boxWrap = document.getElementById('box-wrap');
      var box = document.getElementById('box');
      var autoDismissPlaybackPaused = false;

      function setVisible(visible) {
        boxWrap.classList.toggle('visible', !!visible);
        updateAutoDismissPaused();
      }

      function setAutoDismissDuration(milliseconds) {
        if (typeof milliseconds !== 'number' || !isFinite(milliseconds) || milliseconds <= 0) {
          return;
        }

        box.style.setProperty('--auto-dismiss-ms', milliseconds + 'ms');
      }

      function setProgressIndicatorStyle(style) {
        box.dataset.progressStyle = style === 'bar' ? 'bar' : 'full';
      }

      function postMessage(name, payload) {
        if (typeof iina !== 'undefined') {
          iina.postMessage(name, payload);
        }
      }

      function updateAutoDismissPaused() {
        var visible = boxWrap.classList.contains('visible');
        var interactionPaused = visible && box.matches(':hover, :focus');

        boxWrap.classList.toggle(
          'auto-dismiss-paused',
          visible && (interactionPaused || autoDismissPlaybackPaused),
        );
      }

      window.addEventListener('error', function (event) {
        postMessage('error', event.message);
      });

      box.addEventListener('click', function () {
        postMessage('skip');
      });

      box.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          postMessage('skip');
        }
      });

      box.addEventListener('animationend', function (event) {
        if (event.animationName === 'auto-dismiss-progress') {
          postMessage('autoDismiss');
        }
      });

      box.addEventListener('mouseenter', updateAutoDismissPaused);
      box.addEventListener('mouseleave', updateAutoDismissPaused);
      box.addEventListener('focus', updateAutoDismissPaused);
      box.addEventListener('blur', updateAutoDismissPaused);

      if (typeof iina !== 'undefined') {
        iina.onMessage('playbackPaused', function (paused) {
          autoDismissPlaybackPaused = !!paused;
          updateAutoDismissPaused();
        });

        iina.onMessage('state', function (state) {
          if (!state || !state.visible) {
            setVisible(false);
            return;
          }

          setAutoDismissDuration(state.autoDismissMs);
          autoDismissPlaybackPaused = !!state.playbackPaused;
          setProgressIndicatorStyle(state.progressIndicatorStyle);
          setVisible(true);
        });
      }
    </script>
  </body>
</html>
