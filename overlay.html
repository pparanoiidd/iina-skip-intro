<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }

      body {
        display: flex;
        align-items: flex-end;
        justify-content: flex-end;
        box-sizing: border-box;
        padding: clamp(2px, calc(1.5vw), 46px);
      }

      #box {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 22px 26px;
        border-radius: 10px;

        color: rgba(255, 255, 255, 0.7);
        background: rgba(34, 36, 40, 0.58);
        -webkit-backdrop-filter: blur(32px) saturate(165%) contrast(0.9);
        backdrop-filter: blur(32px) saturate(165%) contrast(0.9);
        cursor: pointer;
        transition:
          opacity 300ms ease,
          visibility 0s linear 300ms,
          filter 140ms ease;
        user-select: none;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #box.visible {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transition-delay: 0s, 0s, 0s, 0s;
      }

      #box.visible:hover {
        filter: brightness(1.18);
      }

      #title {
        color: rgba(255, 255, 255, 0.42);
        font-size: 20px;
        font-weight: 600;
        line-height: 1.2;
        letter-spacing: -0.01em;
        mix-blend-mode: color-dodge;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div
      id="box"
      aria-live="polite"
      data-clickable
      role="button"
      tabindex="0"
      aria-label="Skip Intro"
    >
      <div id="title">Skip Intro</div>
    </div>

    <script>
      var box = document.getElementById('box');
      var skipBtn = box;
      var dismissBtn = document.getElementById('dismiss-btn');

      function setVisible(visible) {
        box.classList.toggle('visible', !!visible);
      }

      function postMessage(name, payload) {
        if (typeof iina !== 'undefined') {
          iina.postMessage(name, payload);
        }
      }

      window.addEventListener('error', function (event) {
        postMessage('error', event.message);
      });

      skipBtn.addEventListener('click', function () {
        postMessage('skip');
      });

      skipBtn.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          postMessage('skip');
        }
      });

      // Keep dismiss handling in place so a close affordance can be restored later.
      if (dismissBtn) {
        dismissBtn.addEventListener('click', function () {
          postMessage('dismiss');
        });
      }

      if (typeof iina !== 'undefined') {
        iina.onMessage('state', function (state) {
          if (!state || !state.visible) {
            setVisible(false);
            return;
          }
          setVisible(true);
        });
      }
    </script>
  </body>
</html>
