<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      }

      body {
        display: flex;
        align-items: flex-end;
        justify-content: flex-end;
        box-sizing: border-box;
        padding: clamp(2px, 1.5vw, 46px);
      }

      #box {
        --auto-dismiss-ms: 10000ms;

        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 22px 26px;
        border-radius: 10px;

        color: rgba(255, 255, 255, 0.7);
        background: rgba(34, 36, 40, 0.58);
        -webkit-backdrop-filter: blur(32px) saturate(165%) contrast(0.9);
        backdrop-filter: blur(32px) saturate(165%) contrast(0.9);
        cursor: pointer;
        transition:
          opacity 300ms ease,
          visibility 0s linear 300ms,
          filter 140ms ease;
        user-select: none;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #box::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: rgba(255, 255, 255, 0.1);
        opacity: 0;
        transform: scaleX(1);
        transform-origin: left center;
        pointer-events: none;
      }

      #box[data-progress-style='bar']::before {
        inset: auto 0 0;
        height: 2px;
        background: rgba(255, 255, 255, 0.34);
      }

      #box.visible {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transition-delay: 0s;
      }

      #box.visible::before {
        opacity: 1;
        animation: auto-dismiss-progress var(--auto-dismiss-ms) linear forwards;
      }

      #box.auto-dismiss-paused::before {
        animation-play-state: paused;
      }

      #box.visible:hover {
        filter: brightness(1.18);
      }

      #title {
        position: relative;
        z-index: 1;
        color: rgba(255, 255, 255, 0.42);
        font-size: 20px;
        font-weight: 600;
        line-height: 1.2;
        letter-spacing: -0.01em;
        mix-blend-mode: color-dodge;
        pointer-events: none;
      }

      @keyframes auto-dismiss-progress {
        from {
          transform: scaleX(1);
        }

        to {
          transform: scaleX(0);
        }
      }
    </style>
  </head>
  <body>
    <div
      id="box"
      aria-live="polite"
      data-clickable
      data-progress-style="full"
      role="button"
      tabindex="0"
      aria-label="Skip Intro"
    >
      <div id="title">Skip Intro</div>
    </div>

    <script>
      var box = document.getElementById('box');
      var autoDismissPlaybackPaused = false;

      function setVisible(visible) {
        box.classList.toggle('visible', !!visible);
        updateAutoDismissPaused();
      }

      function setAutoDismissDuration(milliseconds) {
        if (typeof milliseconds !== 'number' || !isFinite(milliseconds) || milliseconds <= 0) {
          return;
        }

        box.style.setProperty('--auto-dismiss-ms', milliseconds + 'ms');
      }

      function setProgressIndicatorStyle(style) {
        box.dataset.progressStyle = style === 'bar' ? 'bar' : 'full';
      }

      function postMessage(name, payload) {
        if (typeof iina !== 'undefined') {
          iina.postMessage(name, payload);
        }
      }

      function updateAutoDismissPaused() {
        var visible = box.classList.contains('visible');
        var interactionPaused = visible && box.matches(':hover, :focus');

        box.classList.toggle(
          'auto-dismiss-paused',
          visible && (interactionPaused || autoDismissPlaybackPaused)
        );
      }

      window.addEventListener('error', function (event) {
        postMessage('error', event.message);
      });

      box.addEventListener('click', function () {
        postMessage('skip');
      });

      box.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          postMessage('skip');
        }
      });

      box.addEventListener('animationend', function (event) {
        if (event.animationName === 'auto-dismiss-progress') {
          postMessage('autoDismiss');
        }
      });

      box.addEventListener('mouseenter', updateAutoDismissPaused);
      box.addEventListener('mouseleave', updateAutoDismissPaused);
      box.addEventListener('focus', updateAutoDismissPaused);
      box.addEventListener('blur', updateAutoDismissPaused);

      if (typeof iina !== 'undefined') {
        iina.onMessage('playbackPaused', function (paused) {
          autoDismissPlaybackPaused = !!paused;
          updateAutoDismissPaused();
        });

        iina.onMessage('state', function (state) {
          if (!state || !state.visible) {
            setVisible(false);
            return;
          }

          setAutoDismissDuration(state.autoDismissMs);
          autoDismissPlaybackPaused = !!state.playbackPaused;
          setProgressIndicatorStyle(state.progressIndicatorStyle);
          setVisible(true);
        });
      }
    </script>
  </body>
</html>
