<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Skip Intro Preferences</title>
    <style>
      .detection-methods {
        display: grid;
        gap: 10px;
        max-width: 420px;
        margin-top: 8px;
      }

      .detection-method {
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }

      .detection-method input {
        margin-top: 2px;
      }

      .detection-method__text {
        display: grid;
        gap: 2px;
      }

      .detection-method__label {
        font-weight: 500;
      }

      .detection-method__caption {
        line-height: 1.3;
      }

      .detection-method__order {
        font-variant-numeric: tabular-nums;
        opacity: 0.72;
      }
    </style>
  </head>
  <body>
    <div class="pref-section">
      Intro detection methods
      <div class="detection-methods" aria-label="Intro detection methods">
        <label class="detection-method">
          <input type="checkbox" data-pref-key="detect_chapter_titles" data-type="bool" />
          <span class="detection-method__text">
            <span class="detection-method__label">Chapter titles</span>
            <span class="detection-method__caption small secondary">
              <span class="detection-method__order">1.</span>
              Uses chapter names like Intro, Opening, OP, and recap titles.
            </span>
          </span>
        </label>
        <label class="detection-method">
          <input type="checkbox" data-pref-key="detect_audio_matching" data-type="bool" />
          <span class="detection-method__text">
            <span class="detection-method__label">Audio matching</span>
            <span class="detection-method__caption small secondary">
              <span class="detection-method__order">2.</span>
              Compares audio fingerprints against nearby reference episodes.
            </span>
          </span>
        </label>
        <label class="detection-method">
          <input type="checkbox" data-pref-key="detect_chapter_timing" data-type="bool" />
          <span class="detection-method__text">
            <span class="detection-method__label">Chapter timing</span>
            <span class="detection-method__caption small secondary">
              <span class="detection-method__order">3.</span>
              Uses a lower-confidence timing heuristic when earlier methods find nothing.
            </span>
          </span>
        </label>
      </div>
      <p class="small secondary pref-help">
        Enabled methods run in this order and stop after the first match.
      </p>
    </div>

    <div class="pref-section">
      Recap detection
      <div style="margin-top: 4px">
        <label>
          <input type="checkbox" data-pref-key="detect_recaps" data-type="bool" />
          Show skip popup for recap chapters
        </label>
      </div>
      <p class="small secondary pref-help">
        Enables recap title detection and recap-aware popup labeling.
      </p>
    </div>
  </body>
</html>
