<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Skip Intro Preferences</title>
    <style>
      body {
        user-select: none;
        -webkit-user-select: none;
      }

      .preference-heading {
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 2px;
      }

      .detection-sections {
        display: grid;
        gap: 14px;
        max-width: 520px;
        margin-top: 8px;
      }

      .detection-section {
        display: grid;
        gap: 4px;
      }

      .detection-section__title {
        display: flex;
        align-items: flex-start;
        gap: 4px;
      }

      .detection-section__title input,
      .detection-option input,
      .global-option input {
        margin-top: 2px;
      }

      .detection-section__title input[type='checkbox'],
      .detection-option input[type='checkbox'],
      .global-option input[type='checkbox'] {
        transform: scale(1.22);
        transform-origin: center;
      }

      .detection-section__text {
        display: grid;
        gap: 2px;
      }

      .detection-section__label {
        font-weight: 500;
      }

      .detection-section__caption {
        line-height: 1.3;
      }

      .detection-section__notice {
        color: rgb(176, 104, 0);
        line-height: 1.3;
      }

      .detection-options {
        display: grid;
        gap: 7px;
        margin-left: 28px;
      }

      .detection-option {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
      }

      .detection-option__label {
        min-width: 58px;
      }

      .detection-option__text {
        display: grid;
        gap: 2px;
      }

      .detection-option__caption {
        line-height: 1.3;
      }

      .global-options {
        display: grid;
        gap: 8px;
        max-width: 520px;
        margin-top: 8px;
      }

      .global-option {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .global-option__label {
        min-width: 112px;
      }

      .global-option input[type='number'] {
        border: 1px solid rgba(128, 128, 128, 0.18);
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 13px;
        height: 26px;
        line-height: normal;
        margin-bottom: -2px;
        margin-top: 0;
        padding: 0 6px;
        width: 50px;
      }

      .global-option input[type='number']::-webkit-inner-spin-button,
      .global-option input[type='number']::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      .hidden-preference-input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .toggle-control {
        display: inline-flex;
        gap: 2px;
        padding: 2px;
        border: 1px solid rgba(128, 128, 128, 0.18);
        border-radius: 7px;
      }

      .toggle-control input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .toggle-control label {
        padding: 2px 9px;
        border-radius: 5px;
        cursor: pointer;
        white-space: nowrap;
      }

      .toggle-control input:checked + label {
        background: rgba(128, 128, 128, 0.22);
      }

      .toggle-control input:not(:checked) + label:hover {
        background: rgba(128, 128, 128, 0.12);
      }

      .detection-section:has(.detection-section__title input:not(:checked)) .detection-options {
        opacity: 0.45;
        pointer-events: none;
      }

      .preference-actions {
        margin-top: 14px;
      }

      .preference-actions button {
        cursor: pointer;
      }

      .section-divider {
        border-top: 1px solid rgba(128, 128, 128, 0.35);
        margin: 12px 0;
      }
    </style>
  </head>
  <body>
    <div class="pref-section">
      <div class="preference-heading">Intro detection methods</div>
      <p class="small secondary pref-help">
        Enabled methods run in this order and stop after the first match.
      </p>
      <div class="detection-sections" aria-label="Intro detection methods">
        <section class="detection-section">
          <label class="detection-section__title">
            <input type="checkbox" data-pref-key="detect_chapter_titles" data-type="bool" />
            <span class="detection-section__text">
              <span class="detection-section__label">Chapter title detection</span>
              <span class="detection-section__caption small secondary">
                Uses chapter names like Intro, OP, Recap, and Credits.
              </span>
            </span>
          </label>
          <div class="detection-options" aria-label="Chapter title detection options">
            <div
              class="detection-option"
              data-behavior-control
              data-detect-pref-key="detect_intros"
              data-auto-pref-key="auto_skip_title_intros"
            >
              <input
                class="hidden-preference-input"
                tabindex="-1"
                type="checkbox"
                data-pref-key="detect_intros"
                data-type="bool"
              />
              <input
                class="hidden-preference-input"
                tabindex="-1"
                type="checkbox"
                data-pref-key="auto_skip_title_intros"
                data-type="bool"
              />
              <span class="detection-option__label">Intros:</span>
              <div
                class="toggle-control segmented-toggle"
                role="radiogroup"
                aria-label="Chapter title intro behavior"
              >
                <input
                  type="radio"
                  id="title-intros-off"
                  name="title_intros_behavior"
                  value="off"
                />
                <label for="title-intros-off">Off</label>
                <input
                  type="radio"
                  id="title-intros-prompt"
                  name="title_intros_behavior"
                  value="prompt"
                />
                <label for="title-intros-prompt">Prompt</label>
                <input
                  type="radio"
                  id="title-intros-auto"
                  name="title_intros_behavior"
                  value="auto"
                />
                <label for="title-intros-auto">Auto-Skip</label>
              </div>
            </div>
            <div
              class="detection-option"
              data-behavior-control
              data-detect-pref-key="detect_recaps"
              data-auto-pref-key="auto_skip_title_recaps"
            >
              <input
                class="hidden-preference-input"
                tabindex="-1"
                type="checkbox"
                data-pref-key="detect_recaps"
                data-type="bool"
              />
              <input
                class="hidden-preference-input"
                tabindex="-1"
                type="checkbox"
                data-pref-key="auto_skip_title_recaps"
                data-type="bool"
              />
              <span class="detection-option__label">Recaps:</span>
              <div
                class="toggle-control segmented-toggle"
                role="radiogroup"
                aria-label="Chapter title recap behavior"
              >
                <input
                  type="radio"
                  id="title-recaps-off"
                  name="title_recaps_behavior"
                  value="off"
                />
                <label for="title-recaps-off">Off</label>
                <input
                  type="radio"
                  id="title-recaps-prompt"
                  name="title_recaps_behavior"
                  value="prompt"
                />
                <label for="title-recaps-prompt">Prompt</label>
                <input
                  type="radio"
                  id="title-recaps-auto"
                  name="title_recaps_behavior"
                  value="auto"
                />
                <label for="title-recaps-auto">Auto-Skip</label>
              </div>
            </div>
            <div
              class="detection-option"
              data-behavior-control
              data-detect-pref-key="detect_credits"
              data-auto-pref-key="auto_skip_title_credits"
            >
              <input
                class="hidden-preference-input"
                tabindex="-1"
                type="checkbox"
                data-pref-key="detect_credits"
                data-type="bool"
              />
              <input
                class="hidden-preference-input"
                tabindex="-1"
                type="checkbox"
                data-pref-key="auto_skip_title_credits"
                data-type="bool"
              />
              <span class="detection-option__label">Credits:</span>
              <div
                class="toggle-control segmented-toggle"
                role="radiogroup"
                aria-label="Chapter title credits behavior"
              >
                <input
                  type="radio"
                  id="title-credits-off"
                  name="title_credits_behavior"
                  value="off"
                />
                <label for="title-credits-off">Off</label>
                <input
                  type="radio"
                  id="title-credits-prompt"
                  name="title_credits_behavior"
                  value="prompt"
                />
                <label for="title-credits-prompt">Prompt</label>
                <input
                  type="radio"
                  id="title-credits-auto"
                  name="title_credits_behavior"
                  value="auto"
                />
                <label for="title-credits-auto">Auto-Skip</label>
              </div>
            </div>
          </div>
        </section>

        <section class="detection-section">
          <label class="detection-section__title">
            <input type="checkbox" data-pref-key="detect_audio_matching" data-type="bool" />
            <span class="detection-section__text">
              <span class="detection-section__label">Audio fingerprint detection</span>
              <span class="detection-section__caption small secondary">
                Compares audio fingerprints against nearby episodes to find intros.
              </span>
              <span class="detection-section__notice small">
                Requires ffmpeg and Node.js to be installed.
              </span>
            </span>
          </label>
          <div class="detection-options" aria-label="Audio fingerprint detection options">
            <div
              class="detection-option"
              data-behavior-control
              data-auto-pref-key="auto_skip_audio_matching"
            >
              <input
                class="hidden-preference-input"
                tabindex="-1"
                type="checkbox"
                data-pref-key="auto_skip_audio_matching"
                data-type="bool"
              />
              <span class="detection-option__label">Intros:</span>
              <div
                class="toggle-control segmented-toggle"
                role="radiogroup"
                aria-label="Audio fingerprint behavior"
              >
                <input
                  type="radio"
                  id="audio-matching-prompt"
                  name="audio_matching_behavior"
                  value="prompt"
                />
                <label for="audio-matching-prompt">Prompt</label>
                <input
                  type="radio"
                  id="audio-matching-auto"
                  name="audio_matching_behavior"
                  value="auto"
                />
                <label for="audio-matching-auto">Auto-Skip</label>
              </div>
            </div>
            <div class="detection-option">
              <label class="detection-option">
                <input
                  type="checkbox"
                  data-pref-key="audio_match_parse_episode_numbers"
                  data-type="bool"
                />
                <span class="detection-option__text">
                  <span>Use season and episode numbers from filenames?</span>
                  <span class="detection-option__caption small secondary">
                    Helps pick the correct matching reference episodes.
                  </span>
                </span>
              </label>
            </div>
          </div>
        </section>

        <section class="detection-section">
          <label class="detection-section__title">
            <input type="checkbox" data-pref-key="detect_chapter_timing" data-type="bool" />
            <span class="detection-section__text">
              <span class="detection-section__label">Chapter timing detection</span>
              <span class="detection-section__caption small secondary">
                Uses a lower-confidence timing heuristic to find intros. May misfire.
              </span>
            </span>
          </label>
        </section>
      </div>

      <div class="section-divider" aria-hidden="true"></div>

      <div class="preference-heading">Skip pop-up</div>
      <div class="global-options">
        <label class="global-option">
          <span class="global-option__label">Auto hide after:</span>
          <input
            type="number"
            min="5"
            max="20"
            step="1"
            data-pref-key="popup_auto_dismiss_seconds"
            data-type="int"
          />
          <span>s</span>
        </label>
        <label class="global-option">
          <span class="global-option__label">Leave at end:</span>
          <input
            type="number"
            min="0"
            max="10"
            step="1"
            data-pref-key="skip_end_buffer_seconds"
            data-type="int"
          />
          <span>s</span>
        </label>
        <div class="global-option">
          <input
            id="popup-button-grey-preference"
            class="hidden-preference-input"
            tabindex="-1"
            type="checkbox"
            data-pref-key="popup_button_grey"
            data-type="bool"
          />
          <span class="global-option__label">Skip button style:</span>
          <div
            class="toggle-control button-style-toggle"
            role="radiogroup"
            aria-label="Skip button style"
          >
            <input type="radio" id="popup-button-white" name="popup_button_style" value="white" />
            <label for="popup-button-white">White</label>
            <input type="radio" id="popup-button-grey" name="popup_button_style" value="grey" />
            <label for="popup-button-grey">Grey</label>
          </div>
        </div>
      </div>

      <div class="section-divider" aria-hidden="true"></div>

      <div class="preference-heading">Auto-Skip</div>
      <div class="global-options">
        <label class="global-option">
          <span class="global-option__label">Auto-Skip delay:</span>
          <input
            type="number"
            min="0"
            max="10"
            step="1"
            data-pref-key="auto_skip_start_delay_seconds"
            data-type="int"
          />
          <span>s</span>
        </label>
        <label class="global-option">
          <input type="checkbox" data-pref-key="show_auto_skip_status" data-type="bool" />
          <span>Show Auto-Skip status pop-up</span>
        </label>
        <label class="global-option">
          <input
            type="checkbox"
            data-pref-key="auto_skip_first_episode_of_season"
            data-type="bool"
          />
          <span>Auto-Skip first episode of the season</span>
        </label>
      </div>

      <div class="preference-actions">
        <button type="button" id="reset-preferences">Reset to Defaults</button>
      </div>
    </div>
    <script>
      const preferenceDefaults = {
        detect_chapter_titles: true,
        detect_intros: true,
        detect_audio_matching: true,
        audio_match_parse_episode_numbers: true,
        detect_chapter_timing: false,
        detect_recaps: false,
        detect_credits: true,
        auto_skip_title_intros: false,
        auto_skip_title_recaps: false,
        auto_skip_title_credits: false,
        auto_skip_audio_matching: false,
        auto_skip_start_delay_seconds: 0,
        show_auto_skip_status: true,
        auto_skip_first_episode_of_season: true,
        popup_auto_dismiss_seconds: 15,
        skip_end_buffer_seconds: 1,
        popup_button_grey: false,
      };

      function setPreference(key, value) {
        if (
          window.iina &&
          window.iina.preferences &&
          typeof window.iina.preferences.set === 'function'
        ) {
          try {
            window.iina.preferences.set(key, value);
          } catch (error) {
            // Preference pages still receive the dispatched input/change events below.
          }
        }
      }

      function dispatchPreferenceEvent(input, eventName) {
        if (typeof Event === 'function') {
          input.dispatchEvent(new Event(eventName, { bubbles: true }));
          return;
        }

        const event = document.createEvent('Event');
        event.initEvent(eventName, true, true);
        input.dispatchEvent(event);
      }

      function setPreferenceInputValue(input, value, options) {
        if (!input) return;

        const resolvedOptions = options || {};
        if (input.type === 'checkbox') {
          input.checked = value === true || value === 'true';
        } else if (input.type === 'number') {
          input.value = String(value);
          input.setAttribute('value', String(value));
        } else {
          input.value = value;
        }

        if (resolvedOptions.persist) {
          setPreference(input.getAttribute('data-pref-key'), value);
        }
        if (resolvedOptions.dispatch) {
          dispatchPreferenceEvent(input, 'input');
          dispatchPreferenceEvent(input, 'change');
        }
      }

      function clampNumberInput(input) {
        if (!input || input.type !== 'number') return;
        if (input.getAttribute('data-clamping') === 'true') return;
        input.setAttribute('data-clamping', 'true');

        const parsedValue = parseInt(input.value, 10);
        const min = parseInt(input.getAttribute('min'), 10);
        const max = parseInt(input.getAttribute('max'), 10);
        let clampedValue = isFinite(parsedValue) ? parsedValue : min;

        if (isFinite(min)) clampedValue = Math.max(min, clampedValue);
        if (isFinite(max)) clampedValue = Math.min(max, clampedValue);

        setPreferenceInputValue(input, clampedValue, { persist: true, dispatch: true });
        input.removeAttribute('data-clamping');
      }

      function initializeNumberPreferenceClamping() {
        const numberInputs = document.querySelectorAll('input[type="number"][data-pref-key]');
        for (let i = 0; i < numberInputs.length; i++) {
          numberInputs[i].addEventListener('blur', function () {
            clampNumberInput(this);
          });
          numberInputs[i].addEventListener('change', function () {
            clampNumberInput(this);
          });
        }
      }

      function setBooleanPreferenceInput(input, value) {
        setPreferenceInputValue(input, !!value, { persist: true, dispatch: true });
      }

      function getBehaviorFromPreferenceInputs(detectInput, autoInput) {
        if (!detectInput || !detectInput.checked) return 'off';
        return autoInput && autoInput.checked ? 'auto' : 'prompt';
      }

      function syncBehaviorControl(control) {
        const detectKey = control.getAttribute('data-detect-pref-key');
        const autoKey = control.getAttribute('data-auto-pref-key');
        const detectInput = detectKey
          ? control.querySelector('[data-pref-key="' + detectKey + '"]')
          : null;
        const autoInput = control.querySelector('[data-pref-key="' + autoKey + '"]');
        const behavior = detectKey
          ? getBehaviorFromPreferenceInputs(detectInput, autoInput)
          : autoInput && autoInput.checked
            ? 'auto'
            : 'prompt';
        const radio = control.querySelector('input[type="radio"][value="' + behavior + '"]');

        if (radio) radio.checked = true;
      }

      function setBehaviorPreference(control, behavior) {
        const detectKey = control.getAttribute('data-detect-pref-key');
        const autoKey = control.getAttribute('data-auto-pref-key');
        const detectInput = detectKey
          ? control.querySelector('[data-pref-key="' + detectKey + '"]')
          : null;
        const autoInput = control.querySelector('[data-pref-key="' + autoKey + '"]');

        if (detectKey) setBooleanPreferenceInput(detectInput, behavior !== 'off');
        setBooleanPreferenceInput(autoInput, behavior === 'auto');
      }

      function initializeBehaviorControls() {
        const controls = document.querySelectorAll('[data-behavior-control]');
        for (let i = 0; i < controls.length; i++) {
          const control = controls[i];
          const radios = control.querySelectorAll('input[type="radio"]');
          const preferenceInputs = control.querySelectorAll('input[data-pref-key]');

          for (let j = 0; j < radios.length; j++) {
            radios[j].addEventListener('change', function () {
              if (this.checked) setBehaviorPreference(control, this.value);
            });
          }

          for (let j = 0; j < preferenceInputs.length; j++) {
            preferenceInputs[j].addEventListener('change', function () {
              syncBehaviorControl(control);
            });
          }

          syncBehaviorControl(control);
        }
      }

      function syncPreferenceProxyControls() {
        syncPopupButtonStyleControl();

        const behaviorControls = document.querySelectorAll('[data-behavior-control]');
        for (let i = 0; i < behaviorControls.length; i++) {
          syncBehaviorControl(behaviorControls[i]);
        }
      }

      function schedulePreferenceProxySync() {
        const delays = [0, 50, 250];
        for (let i = 0; i < delays.length; i++) {
          setTimeout(syncPreferenceProxyControls, delays[i]);
        }
      }

      function setPopupButtonGreyPreference(isGrey) {
        const preferenceInput = document.getElementById('popup-button-grey-preference');
        setBooleanPreferenceInput(preferenceInput, !!isGrey);
      }

      function syncPopupButtonStyleControl() {
        const preferenceInput = document.getElementById('popup-button-grey-preference');
        const whiteInput = document.getElementById('popup-button-white');
        const greyInput = document.getElementById('popup-button-grey');
        if (!preferenceInput || !whiteInput || !greyInput) return;

        greyInput.checked = !!preferenceInput.checked;
        whiteInput.checked = !preferenceInput.checked;
      }

      function initializePopupButtonStyleControl() {
        const preferenceInput = document.getElementById('popup-button-grey-preference');
        const whiteInput = document.getElementById('popup-button-white');
        const greyInput = document.getElementById('popup-button-grey');
        if (!preferenceInput || !whiteInput || !greyInput) return;

        preferenceInput.addEventListener('change', syncPopupButtonStyleControl);
        whiteInput.addEventListener('change', function () {
          if (whiteInput.checked) setPopupButtonGreyPreference(false);
        });
        greyInput.addEventListener('change', function () {
          if (greyInput.checked) setPopupButtonGreyPreference(true);
        });

        syncPopupButtonStyleControl();
      }

      initializePopupButtonStyleControl();
      initializeBehaviorControls();
      initializeNumberPreferenceClamping();
      schedulePreferenceProxySync();

      document.getElementById('reset-preferences').addEventListener('click', function () {
        Object.keys(preferenceDefaults).forEach(function (key) {
          const value = preferenceDefaults[key];
          const input = document.querySelector('[data-pref-key="' + key + '"]');
          if (!input) return;

          setPreferenceInputValue(input, value, { persist: true, dispatch: true });
        });
      });
    </script>
  </body>
</html>
