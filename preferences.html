<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Skip Intro Preferences</title>
  </head>
  <body>
    <div class="pref-section">
      Progress indicator
      <div style="margin-top: 4px">
        <label>
          <input type="radio" name="progress_indicator_style" value="full" />
          Full-height fill
        </label>
      </div>
      <div style="margin-top: 2px">
        <label>
          <input type="radio" name="progress_indicator_style" value="bar" />
          Bottom bar
        </label>
      </div>
      <p class="small secondary pref-help">
        Choose how the skip prompt shows its auto-dismiss countdown.
      </p>
    </div>
  </body>
</html>
