<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Skip Intro Preferences</title>
    <style>
      .detection-mode {
        position: relative;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        max-width: 360px;
        margin-top: 8px;
      }

      .detection-mode::before {
        content: '';
        position: absolute;
        top: 5px;
        left: calc(25% + 7px);
        right: calc(25% + 7px);
        height: 2px;
        background: rgba(0, 0, 0, 0.16);
      }

      .detection-mode__option {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        text-align: center;
        cursor: pointer;
      }

      .detection-mode__input {
        position: absolute;
        inset: 0;
        margin: 0;
        opacity: 0;
        cursor: pointer;
      }

      .detection-mode__point {
        position: relative;
        z-index: 1;
        width: 12px;
        height: 12px;
        border: 2px solid rgba(0, 0, 0, 0.4);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.95);
        transition:
          border-color 120ms ease,
          background-color 120ms ease,
          box-shadow 120ms ease;
      }

      .detection-mode__label {
        font-weight: 500;
      }

      .detection-mode__caption {
        line-height: 1.3;
      }

      .detection-mode__input:checked + .detection-mode__point {
        border-color: rgb(0, 122, 255);
        background: rgb(0, 122, 255);
        box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.14);
      }

      .detection-mode__input:focus-visible + .detection-mode__point {
        box-shadow:
          0 0 0 4px rgba(0, 122, 255, 0.14),
          0 0 0 1px rgba(0, 122, 255, 0.7);
      }

      @media (prefers-color-scheme: dark) {
        .detection-mode::before {
          background: rgba(255, 255, 255, 0.18);
        }

        .detection-mode__point {
          border-color: rgba(255, 255, 255, 0.42);
          background: rgba(42, 42, 44, 0.9);
        }
      }
    </style>
  </head>
  <body>
    <div class="pref-section">
      Intro detection
      <div class="detection-mode" role="radiogroup" aria-label="Intro detection mode">
        <label class="detection-mode__option">
          <input
            class="detection-mode__input"
            type="radio"
            name="intro_detection_mode"
            value="safe"
            data-pref-key
          />
          <span class="detection-mode__point" aria-hidden="true"></span>
          <span class="detection-mode__label">Safe</span>
          <span class="detection-mode__caption small secondary">Chapter titles only</span>
        </label>
        <label class="detection-mode__option">
          <input
            class="detection-mode__input"
            type="radio"
            name="intro_detection_mode"
            value="balanced"
            data-pref-key
          />
          <span class="detection-mode__point" aria-hidden="true"></span>
          <span class="detection-mode__label">Balanced</span>
          <span class="detection-mode__caption small secondary">Titles plus timing fallback</span>
        </label>
      </div>
      <p class="small secondary pref-help">
        Safe only uses high-confidence chapter titles. Balanced also enables the lower-confidence
        chapter timing heuristic.
      </p>
    </div>

    <div class="pref-section">
      Recap detection
      <div style="margin-top: 4px">
        <label>
          <input type="checkbox" data-pref-key="detect_recaps" data-type="bool" />
          Show skip popup for recap chapters
        </label>
      </div>
      <p class="small secondary pref-help">
        Enables recap title detection and recap-aware popup labeling.
      </p>
    </div>

    <div class="pref-section">
      Progress indicator
      <div style="margin-top: 4px">
        <label>
          <input type="radio" name="progress_indicator_style" value="full" data-pref-key />
          Full-height fill
        </label>
      </div>
      <div style="margin-top: 2px">
        <label>
          <input type="radio" name="progress_indicator_style" value="bar" data-pref-key />
          Bottom bar
        </label>
      </div>
      <p class="small secondary pref-help">
        Choose how the skip prompt shows its auto-dismiss countdown.
      </p>
    </div>
  </body>
</html>
